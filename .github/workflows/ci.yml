name: Definance Continuous Integration
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # FRONTEND (Next)
  frontend-ci:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./definance-frontend

    steps:
      - name: Checar Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./definance-frontend/package-lock.json

      - name: Instalar Dependências
        run: npm ci

      - name: Linting (Typescript Extrito)
        run: npm run build

      - name: Compilar Frontend Seguro
        run: npm run build

  # BACKEND (.NET 8.0)
  backend-ci:
    name: Backend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./definance-backend/definance-backend

    steps:
      - name: Checar Código
        uses: actions/checkout@v4

      - name: Configurar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restaurar Pacotes
        run: dotnet restore

      - name: Compilar (Zero Erros)
        run: dotnet build --no-restore -c Release